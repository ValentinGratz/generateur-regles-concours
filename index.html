<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Règles de concours générées par IA</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
<style>
    body {
        font-family: 'Inter', sans-serif;
        background: #fafafa;
    }
    .gradient-text {
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .btn-gradient {
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        transition: all 0.3s ease;
    }
    .btn-gradient:hover {
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        transform: translateY(-1px);
        box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
    }
    .btn-gradient:disabled {
        background: #d1d5db;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }
    .fade-in {
        animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .typing {
        overflow: hidden;
        border-right: 2px solid #6366f1;
        white-space: nowrap;
        animation: typing 3s steps(40, end), blink-caret 0.75s step-end infinite;
    }
    @keyframes typing {
        from { width: 0 }
        to { width: 100% }
    }
    @keyframes blink-caret {
        from, to { border-color: transparent }
        50% { border-color: #6366f1 }
    }
    .loader {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #6366f1;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>
<body class="min-h-screen">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-8 sm:py-16">
        <!-- Header -->
        <header class="text-center mb-12 sm:mb-16">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 mb-6 shadow-lg">
                <span class="material-icons-round text-white text-2xl">auto_awesome</span>
            </div>
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold text-gray-900 mb-3">
                Règles de concours générées par IA
            </h1>
            <p class="text-lg sm:text-xl text-gray-600 font-light">
                Génération de règles par IA
            </p>
        </header>

        <!-- Main Card -->
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-6 sm:p-8 md:p-10">
            <!-- Input Section -->
            <div class="mb-6">
                <label for="contestDesc" class="block text-sm font-medium text-gray-700 mb-3">
                    Description de votre concours
                </label>
                <div class="relative">
                    <textarea 
                        id="contestDesc" 
                        rows="4" 
                        class="w-full px-4 py-3 sm:py-4 text-gray-900 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200 resize-none text-base placeholder:text-gray-400"
                        placeholder="Tapez une courte description de votre concours dans n'importe quelle langue"
                    ></textarea>
                    <div id="charCount" class="absolute bottom-3 right-4 text-xs text-gray-400">0 / 500</div>
                </div>
            </div>

            <!-- Generate Button -->
            <button 
                id="generateBtn" 
                class="btn-gradient w-full sm:w-auto px-8 py-3.5 text-white font-medium rounded-2xl flex items-center justify-center gap-2 shadow-lg disabled:opacity-100"
                onclick="generateRules()"
            >
                <span id="btnText">Générer</span>
                <span class="material-icons-round text-xl" id="btnIcon">chevron_right</span>
            </button>

            <!-- Loader -->
            <div id="loaderSection" class="hidden mt-8 text-center py-8">
                <div class="loader mx-auto mb-4"></div>
                <p class="text-gray-600 text-sm">Génération des règles en cours...</p>
            </div>

            <!-- Results Section -->
            <div id="resultsSection" class="hidden mt-8 pt-8 border-t border-gray-100">
                <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
                    <h2 class="text-xl sm:text-2xl font-semibold text-gray-900 flex items-center gap-2">
                        <span class="material-icons-round text-indigo-600">description</span>
                        Règlement du concours
                    </h2>
                    <button 
                        onclick="copyRules()" 
                        class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors"
                    >
                        <span class="material-icons-round text-lg" id="copyIcon">content_copy</span>
                        <span id="copyText">Copier</span>
                    </button>
                </div>
                <div id="rulesContent" class="prose prose-sm sm:prose max-w-none text-gray-700 space-y-4">
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center text-sm text-gray-500">
            <p>Généré par intelligence artificielle • Modifiez selon vos besoins légaux</p>
        </footer>
    </div>

    <script>
        const contestDesc = document.getElementById('contestDesc');
        const charCount = document.getElementById('charCount');
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const loaderSection = document.getElementById('loaderSection');
        const resultsSection = document.getElementById('resultsSection');
        const rulesContent = document.getElementById('rulesContent');

        contestDesc.addEventListener('input', () => {
            const length = contestDesc.value.length;
            charCount.textContent = `${length} / 500`;
            if (length > 500) {
                charCount.classList.add('text-red-500');
                contestDesc.value = contestDesc.value.substring(0, 500);
            } else {
                charCount.classList.remove('text-red-500');
            }
        });

        function generateRules() {
            const description = contestDesc.value.trim();
            
            if (!description) {
                contestDesc.classList.add('ring-2', 'ring-red-500');
                setTimeout(() => contestDesc.classList.remove('ring-2', 'ring-red-500'), 2000);
                return;
            }

            // Show loading
            generateBtn.disabled = true;
            btnText.textContent = 'Génération...';
            btnIcon.style.display = 'none';
            loaderSection.classList.remove('hidden');
            resultsSection.classList.add('hidden');

            // Simulate AI generation delay
            setTimeout(() => {
                const rules = createRulesFromDescription(description);
                displayRules(rules);
                
                // Hide loading, show results
                loaderSection.classList.add('hidden');
                resultsSection.classList.remove('hidden');
                resultsSection.classList.add('fade-in');
                
                generateBtn.disabled = false;
                btnText.textContent = 'Générer';
                btnIcon.style.display = 'block';

                // Scroll to results on mobile
                if (window.innerWidth < 768) {
                    resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 1500);
        }

        function createRulesFromDescription(desc) {
            const today = new Date();
            const endDate = new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000);
            const formatDate = (date) => date.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
            
            const descLower = desc.toLowerCase();
            const isInstagram = descLower.includes('instagram');
            const isTiktok = descLower.includes('tiktok');
            const isFollow = descLower.includes('follow') || descLower.includes('suivre') || descLower.includes('abonner');
            const isLike = descLower.includes('like') || descLower.includes('aimer');
            const isComment = descLower.includes('comment') || descLower.includes('commentaire');
            const isTag = descLower.includes('tag') || descLower.includes('identifier') || descLower.includes('ami');
            const isShare = descLower.includes('partage') || descLower.includes('story') || descLower.includes('repost');

            let conditions = [];
            if (isFollow) conditions.push('Suivre le compte @votrecompte');
            if (isLike) conditions.push('Aimer la publication du concours');
            if (isComment) conditions.push('Commenter la publication en répondant à la question posée');
            if (isTag) conditions.push('Identifier 2 amis en commentaire');
            if (isShare) conditions.push('Partager la publication en story en nous mentionnant');
            
            if (conditions.length === 0) {
                conditions = [
                    'Suivre le compte organisateur',
                    'Aimer la publication du concours',
                    'Identifier 2 amis en commentaire'
                ];
            }

            const platform = isInstagram ? 'Instagram' : isTiktok ? 'TikTok' : 'les réseaux sociaux';

            return {
                title: `Concours : ${desc.substring(0, 60)}${desc.length > 60 ? '...' : ''}`,
                dates: `Du ${formatDate(today)} au ${formatDate(endDate)} à 23h59 (heure de Paris)`,
                conditions: conditions,
                platform: platform,
                prize: 'À définir par l\'organisateur',
                draw: 'À définir par l\'organisateur',
                extras: desc
            };
        }

        function displayRules(data) {
            rulesContent.innerHTML = `
                <div class="bg-gray-50 rounded-xl p-5 mb-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-2">${data.title}</h3>
                    <p class="text-sm text-gray-600">${data.extras}</p>
                </div>

                <div class="space-y-5">
                    <section>
                        <h4 class="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                            <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm">1</span>
                            Organisateur
                        </h4>
                        <p class="text-gray-700 ml-8">Ce concours est organisé par l'auteur de cette description.</p>
                    </section>

                    <section>
                        <h4 class="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                            <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm">2</span>
                            Durée du concours
                        </h4>
                        <p class="text-gray-700 ml-8">${data.dates}</p>
                    </section>

                    <section>
                        <h4 class="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                            <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm">3</span>
                            Conditions de participation
                        </h4>
                        <p class="text-gray-700 ml-8 mb-2">Pour participer au concours sur ${data.platform}, vous devez :</p>
                        <ul class="ml-8 space-y-2">
                            ${data.conditions.map(c => `<li class="flex items-start gap-2"><span class="material-icons-round text-indigo-600 text-lg mt-0.5">check_circle</span><span class="text-gray-700">${c}</span></li>`).join('')}
                        </ul>
                        <p class="text-gray-700 ml-8 mt-3">La participation est gratuite et sans obligation d'achat. Une seule participation par personne.</p>
                    </section>

                    <section>
                        <h4 class="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                            <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm">4</span>
                            Désignation du gagnant
                        </h4>
                        <p class="text-gray-700 ml-8">Le gagnant sera désigné par tirage au sort à la date prévue parmi les participants ayant respecté l'ensemble des conditions. Le tirage sera effectué de manière aléatoire et équitable.</p>
                    </section>

                    <section>
                        <h4 class="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                            <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm">5</span>
                            Dotation
                        </h4>
                        <p class="text-gray-700 ml-8">Le gagnant remporte : <strong>${data.prize}</strong>. La dotation ne pourra en aucun cas être échangée contre sa valeur en espèces.</p>
                    </section>

                    <section>
                        <h4 class="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                            <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm">6</span>
                            Annonce du gagnant
                        </h4>
                        <p class="text-gray-700 ml-8">Le gagnant sera contacté directement via ${data.platform} dans un délai de 7 jours suivant le tirage. Sans réponse de sa part sous 14 jours, un nouveau tirage sera effectué.</p>
                    </section>

                    <section>
                        <h4 class="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                            <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm">7</span>
                            Données personnelles
                        </h4>
                        <p class="text-gray-700 ml-8">Les informations collectées sont destinées uniquement à la gestion du concours. Conformément au RGPD, vous disposez d'un droit d'accès, de rectification et de suppression de vos données.</p>
                    </section>

                    <section>
                        <h4 class="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                            <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm">8</span>
                            Responsabilité
                        </h4>
                        <p class="text-gray-700 ml-8">Ce concours n'est pas géré ou parrainé par ${data.platform}. L'organisateur se réserve le droit de modifier ou d'annuler le concours en cas de force majeure.</p>
                    </section>
                </div>

                <div class="mt-6 p-4 bg-amber-50 border border-amber-200 rounded-xl">
                    <p class="text-sm text-amber-800 flex items-start gap-2">
                        <span class="material-icons-round text-lg">warning</span>
                        <span>Ce règlement est généré par IA à titre d'exemple. Veuillez le faire vérifier par un professionnel avant toute utilisation officielle.</span>
                    </p>
                </div>
            `;
        }

        function copyRules() {
            const rulesText = rulesContent.innerText;
            navigator.clipboard.writeText(rulesText).then(() => {
                const copyIcon = document.getElementById('copyIcon');
                const copyText = document.getElementById('copyText');
                
                copyIcon.textContent = 'check';
                copyText.textContent = 'Copié !';
                
                setTimeout(() => {
                    copyIcon.textContent = 'content_copy';
                    copyText.textContent = 'Copier';
                }, 2000);
            });
        }

        // Allow Enter + Ctrl/Cmd to generate
        contestDesc.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                generateRules();
            }
        });
    </script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
